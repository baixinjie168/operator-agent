<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Flow - 文档解析流程可视化</title>
<style>
:root {
  --bg:#f8fafc;--card:#ffffff;--card-border:#e2e8f0;
  --text:#1e293b;--text-dim:#64748b;--text-muted:#94a3b8;
  --accent:#6366f1;--accent-light:#4f46e5;
  --green:#16a34a;--green-bg:#f0fdf4;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --red:#dc2626;--red-bg:#fef2f2;
  --yellow:#d97706;--yellow-bg:#fffbeb;
  --node-w:156px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-hover:0 6px 20px rgba(99,102,241,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:var(--card);border-bottom:1px solid var(--card-border);
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header h1{font-size:1.15rem;font-weight:700;display:flex;align-items:center;gap:10px;color:var(--text)}
.header h1 .sub{font-size:.82rem;color:var(--text-dim);font-weight:400}
.btn{padding:7px 18px;border-radius:8px;border:none;font-size:.85rem;cursor:pointer;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-light)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--card-border);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent-light)}
.header-actions{display:flex;gap:10px;align-items:center}
.speed-ctrl{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--text-dim)}
.speed-ctrl select{background:var(--card);color:var(--text);border:1px solid var(--card-border);border-radius:4px;padding:3px 6px;font-size:.78rem}
.stats-bar{background:var(--card);border-bottom:1px solid var(--card-border);padding:8px 28px;display:flex;gap:20px;font-size:.82rem;align-items:center}
.stat{display:flex;align-items:center;gap:5px;color:var(--text-dim)}
.stat-dot{width:7px;height:7px;border-radius:50%}
.dot-pending{background:#cbd5e1}.dot-active{background:var(--blue);animation:blink 1s ease infinite}.dot-done{background:var(--green)}.dot-error{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.progress-track{flex:1;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;max-width:300px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .3s;width:0}
.timer{font-family:"JetBrains Mono",Consolas,monospace;color:var(--accent);font-weight:600;min-width:52px;text-align:right;font-size:.82rem}
.main-wrap{display:flex;height:calc(100vh - 96px)}
.flow-area{flex:1;padding:28px 20px 48px;overflow:auto}
.detail-panel{width:330px;min-width:330px;background:var(--card);border-left:1px solid var(--card-border);padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.detail-panel.collapsed{width:0;min-width:0;padding:0;overflow:hidden;border:none}
.phase{margin-bottom:36px;position:relative}
.phase-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.phase-num{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;transition:.3s}
.phase-num.s-done{background:var(--green)}.phase-num.s-active{background:var(--blue);animation:blink 1.2s ease infinite}
.phase-title{font-size:1rem;font-weight:600;color:var(--text)}
.phase-tag{font-size:.72rem;padding:2px 9px;border-radius:10px;font-weight:600}
.tag-parallel{background:var(--blue-bg);color:var(--blue)}
.tag-subgraph{background:var(--yellow-bg);color:var(--yellow)}
.tag-serial{background:#f0f0ff;color:var(--accent)}
.nodes-row{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;padding:0 4px}
.node{width:var(--node-w);background:var(--card);border:1.5px solid var(--card-border);border-radius:12px;padding:11px 8px;cursor:pointer;transition:all .25s;position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;gap:3px;box-shadow:var(--shadow)}
.node:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.node.s-pending{opacity:.5}
.node.s-active{border-color:var(--blue);background:var(--blue-bg);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.node.s-active .n-icon{animation:bounce .6s ease infinite}
.node.s-done{border-color:var(--green);background:var(--green-bg)}
.node.s-error{border-color:var(--red);background:var(--red-bg)}
.node.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.n-icon{font-size:1.4rem;line-height:1}
.n-label{font-size:.76rem;font-weight:600;color:var(--text);line-height:1.2;min-height:2.2em;display:flex;align-items:center}
.n-desc{font-size:.62rem;color:var(--text-dim);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.n-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%}
.s-pending .n-dot{background:#cbd5e1}.s-active .n-dot{background:var(--blue);animation:blink .8s ease infinite}.s-done .n-dot{background:var(--green)}.s-error .n-dot{background:var(--red)}
.n-time{font-size:.58rem;color:var(--text-muted);font-family:monospace;margin-top:1px}
.conn{display:flex;justify-content:center;padding:2px 0;margin:-6px 0}
.conn svg{width:20px;height:28px}
.conn .cl{stroke:#cbd5e1;stroke-width:2;transition:stroke .3s}
.conn .ch{fill:#cbd5e1;transition:fill .3s}
.conn.s-active .cl{stroke:var(--blue)}.conn.s-active .ch{fill:var(--blue)}
.conn.s-done .cl{stroke:var(--green)}.conn.s-done .ch{fill:var(--green)}
.fan-svg{display:block;margin:0 auto}
.d-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text)}
.d-phase-tag{font-size:.7rem;padding:2px 8px;border-radius:8px;background:var(--accent);color:#fff}
.d-section{display:flex;flex-direction:column;gap:3px}
.d-label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.d-value{font-size:.82rem;color:var(--text);line-height:1.5;word-break:break-word}
.d-value code{background:#eef2ff;color:var(--accent);padding:1px 5px;border-radius:3px;font-family:"JetBrains Mono",Consolas,monospace;font-size:.78rem}
.d-placeholder{color:var(--text-muted);font-size:.82rem;text-align:center;padding:36px 16px;line-height:1.6}
.log-wrap{background:var(--card);border-top:1px solid var(--card-border);padding:6px 28px;max-height:100px;overflow-y:auto;font-family:"JetBrains Mono",Consolas,monospace;font-size:.72rem;line-height:1.5}
.log-line{color:var(--text-dim)}.log-line .lt{color:var(--text-muted);margin-right:6px}.log-line .ln{color:var(--accent);font-weight:600}
.log-line.la{color:var(--blue)}.log-line.ld{color:var(--green)}.log-line.le{color:var(--red)}
@media(max-width:900px){.detail-panel{position:fixed;right:0;top:0;bottom:0;z-index:200;box-shadow:-4px 0 20px rgba(0,0,0,.12)}:root{--node-w:130px}}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>🔄 Pipeline Flow <span class="sub">文档解析流程实时可视化</span></h1>
  <div class="header-actions">
    <div class="speed-ctrl">
      <span>速度</span>
      <select id="speedSel" onchange="setSpeed(this.value)">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="2">2x</option>
        <option value="4">4x</option>
      </select>
    </div>
    <button class="btn btn-outline" onclick="resetSim()">⟲ 重置</button>
    <button class="btn btn-primary" id="startBtn" onclick="startSim()">▶ 开始模拟</button>
    <button class="btn btn-outline" id="pauseBtn" onclick="togglePause()" style="display:none">⏸ 暂停</button>
  </div>
</div>

<!-- Stats Bar -->
<div class="stats-bar">
  <div class="stat"><span class="stat-dot dot-pending"></span><span id="sPending">19 待处理</span></div>
  <div class="stat"><span class="stat-dot dot-active"></span><span id="sActive">0 进行中</span></div>
  <div class="stat"><span class="stat-dot dot-done"></span><span id="sDone">0 已完成</span></div>
  <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
  <div class="timer" id="timerDisp">0.0s</div>
</div>

<!-- Main -->
<div class="main-wrap">
  <div class="flow-area" id="flowArea"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="d-placeholder" id="detailPlaceholder">
      <div style="font-size:2rem;margin-bottom:8px">👆</div>
      <div>点击任意节点查看详细信息</div>
      <div style="margin-top:12px;font-size:.78rem">开始模拟后，节点会实时高亮显示当前正在执行的步骤</div>
    </div>
    <div id="detailContent" style="display:none"></div>
  </div>
</div>

<!-- Log -->
<div class="log-wrap" id="logWrap"></div>

<script>
/* ===== Pipeline Data (matching graph.py) ===== */
const PHASES = [
  {id:"phase1",num:1,label:"Phase 1 · 初始化",tag:"serial",nodes:[
    {id:"init_doc",label:"InitDoc",icon:"📄",desc:"版本检查 → 文档保存 → Markdown解析",input:"operator_name, content, content_hash",output:"doc_id, version, sections, status",detail:"MCP: check_version → save_doc → parse_doc → save_parsed",time:1800},
  ]},
  {id:"phase2",num:2,label:"Phase 2 · 基础提取（并行）",tag:"parallel",nodes:[
    {id:"product_support",label:"ProductSupport",icon:"🏢",desc:"提取平台/产品支持列表",input:"sections",output:"[{product, support}]",detail:"LLM × 1",time:2200},
    {id:"parse_params",label:"ParseParams",icon:"📋",desc:"从C函数原型提取参数列表",input:"sections",output:"[{function, parameter}]",detail:"LLM × 1",time:2000},
    {id:"function_signature_extract",label:"FunctionSignature",icon:"✍️",desc:"提取完整函数签名",input:"sections",output:"[{function_name, return_type, parameters}]",detail:"LLM × 1",time:2500},
    {id:"function_explanation_extract",label:"FuncExplanation",icon:"💡",desc:"提取函数功能说明与公式",input:"sections",output:"{description, formula, key_points}",detail:"LLM × 1",time:2300},
  ]},
  {id:"phase3",num:3,label:"Phase 3 · 描述生成（子图）",tag:"subgraph",nodes:[
    {id:"llm_description_extract",label:"LlmDescriptionExtract",icon:"📝",desc:"为每个参数生成结构化描述（子图：提取exe→ws→校验→保存）",input:"parameters + src_content",output:"[{llm_description, direction, is_support_discontinuous}]",detail:"LLM × N (并发5)",time:5000},
  ]},
  {id:"phase4",num:4,label:"Phase 4 · 属性提取（10路并行）",tag:"parallel",nodes:[
    {id:"shape_extract",label:"Shape",icon:"📐",desc:"Shape维度",output:"shape: [N,C,H,W]",detail:"LLM: SHAPE_EXTRACT_PROMPT",time:1500},
    {id:"dtype_extract",label:"Dtype",icon:"🔤",desc:"数据类型",output:"data_type: FLOAT32",detail:"LLM: DTYPE_EXTRACT_PROMPT",time:1500},
    {id:"dformat_extract",label:"DFormat",icon:"📦",desc:"数据格式",output:"data_format: ND/NCHW",detail:"LLM: DFORMAT_EXTRACT_PROMPT",time:1500},
    {id:"optional_extract",label:"Optional",icon:"❓",desc:"是否可选",output:"is_optional: 0/1",detail:"LLM: OPTIONAL_EXTRACT_PROMPT",time:1200},
    {id:"array_length_extract",label:"ArrayLen",icon:"📏",desc:"数组长度(仅数组类型)",output:"array_length: e.g. 8",detail:"LLM: ARRAY_LENGTH_EXTRACT_PROMPT",time:1300},
    {id:"allowed_range_extract",label:"Range",icon:"↔️",desc:"取值范围(文本)",output:"allowed_range_value",detail:"LLM: ALLOWED_RANGE_EXTRACT_PROMPT",time:1600},
    {id:"return_code_extract",label:"RetCode",icon:"⚠️",desc:"返回值错误码",output:"[{return_value, error_code}]",detail:"LLM: RETURN_CODE_EXTRACT_PROMPT",time:2000},
    {id:"determinism_extract",label:"Determinism",icon:"🎯",desc:"确定性计算",output:"deterministic: true/false",detail:"LLM: DETERMINISM_EXTRACT (t=0.0)",time:1400},
    {id:"dtype_combo_extract",label:"DtypeCombo",icon:"🧩",desc:"数据类型组合约束",output:"[{platform, combo}]",detail:"LLM: DTYPE_COMBO_TABLE (t=0.0)",time:3500},
    {id:"param_relation_extract",label:"ParamRelation",icon:"🔗",desc:"参数间约束关系(子图)",output:"[{relation_type, params}]",detail:"LLM: RELATION_EXTRACT (子图)",time:4500},
  ]},
  {id:"phase5",num:5,label:"Phase 5 · 构建",tag:"serial",nodes:[
    {id:"build_param_relations",label:"BuildRelations",icon:"🐍",desc:"约束描述→Python布尔表达式",input:"param_relations",output:"{expr_type, expr: python_bool}",detail:"LLM: RELATION_OBJECT_BUILD (10种类型)",time:3000},
    {id:"build_param_constraint",label:"BuildConstraint",icon:"🏗️",desc:"组装每个参数的完整约束JSON",input:"全部属性 + relations + sigs",output:"param_constraint (per platform)",detail:"LLM: SHAPE_TO_DIM + ALLOWED_RANGE_BUILD",time:4000},
  ]},
  {id:"phase6",num:6,label:"Phase 6 · 汇总",tag:"serial",nodes:[
    {id:"assemble_result",label:"AssembleResult",icon:"✅",desc:"聚合所有数据，生成最终约束结果",input:"doc_id → DB查询全量数据",output:"constraints_result JSON",detail:"纯数据聚合，无LLM调用",time:800},
  ]},
];

/* Flatten all node IDs in execution order */
const ALL_NODES = [];
PHASES.forEach(p => p.nodes.forEach(n => ALL_NODES.push(n.id)));
const TOTAL = ALL_NODES.length;

/* ===== State ===== */
let nodeState = {}; /* id -> "pending"|"active"|"done"|"error" */
let selectedNode = null;
let simRunning = false;
let simPaused = false;
let simSpeed = 1;
let simTimer = null;
let elapsedMs = 0;
let timerInterval = null;
let doneCount = 0;

/* ===== Render ===== */
function renderFlow() {
  const area = document.getElementById("flowArea");
  let html = "";
  PHASES.forEach((phase, pi) => {
    const tagClass = phase.tag === "parallel" ? "tag-parallel" : phase.tag === "subgraph" ? "tag-subgraph" : "tag-serial";
    const tagText = phase.tag === "parallel" ? "并行" : phase.tag === "subgraph" ? "子图" : "串行";
    html += '<div class="phase" id="' + phase.id + '">';
    html += '<div class="phase-hdr">';
    html += '<div class="phase-num" id="pn' + phase.num + '">' + phase.num + '</div>';
    html += '<div class="phase-title">' + phase.label + '</div>';
    html += '<span class="phase-tag ' + tagClass + '">' + tagText + '</span>';
    html += '</div>';

    /* Fan-out connector before parallel phases */
    if (phase.tag === "parallel" && phase.nodes.length > 1) {
      const w = phase.nodes.length * 170;
      html += '<svg class="fan-svg" width="' + w + '" height="24" viewBox="0 0 ' + w + ' 24">';
      const cx = w / 2;
      phase.nodes.forEach((n, ni) => {
        const tx = (ni + 0.5) * (w / phase.nodes.length);
        html += '<line x1="' + cx + '" y1="0" x2="' + tx + '" y2="20" stroke="var(--card-border)" stroke-width="1.5" class="fan-line" data-phase="' + phase.id + '"/>';
      });
      html += '</svg>';
    }

    html += '<div class="nodes-row">';
    phase.nodes.forEach(n => {
      nodeState[n.id] = "pending";
      html += '<div class="node s-pending" id="nd-' + n.id + '" onclick="selectNode(\'' + n.id + '\')">';
      html += '<div class="n-dot"></div>';
      html += '<div class="n-icon">' + n.icon + '</div>';
      html += '<div class="n-label">' + n.label + '</div>';
      html += '<div class="n-desc">' + n.desc + '</div>';
      html += '<div class="n-time" id="nt-' + n.id + '"></div>';
      html += '</div>';
    });
    html += '</div>';

    /* Fan-in connector after parallel phases */
    if (phase.tag === "parallel" && phase.nodes.length > 1) {
      const w = phase.nodes.length * 170;
      html += '<svg class="fan-svg" width="' + w + '" height="24" viewBox="0 0 ' + w + ' 24">';
      const cx = w / 2;
      phase.nodes.forEach((n, ni) => {
        const tx = (ni + 0.5) * (w / phase.nodes.length);
        html += '<line x1="' + tx + '" y1="4" x2="' + cx + '" y2="24" stroke="var(--card-border)" stroke-width="1.5" class="fan-line" data-phase="' + phase.id + '"/>';
      });
      html += '</svg>';
    }

    html += '</div>';

    /* Arrow connector between phases */
    if (pi < PHASES.length - 1) {
      html += '<div class="conn" id="conn' + pi + '"><svg viewBox="0 0 20 28"><line class="cl" x1="10" y1="0" x2="10" y2="22"/><polygon class="ch" points="5,20 10,28 15,20"/></svg></div>';
    }
  });
  area.innerHTML = html;
}

/* ===== Node helpers ===== */
function setNodeState(id, st) {
  nodeState[id] = st;
  var el = document.getElementById("nd-" + id);
  if (!el) return;
  el.className = "node s-" + st + (selectedNode === id ? " selected" : "");
}

function updateStats() {
  var pending = 0, active = 0, done = 0;
  ALL_NODES.forEach(function(id) {
    var s = nodeState[id];
    if (s === "pending") pending++;
    else if (s === "active") active++;
    else if (s === "done") done++;
  });
  doneCount = done;
  document.getElementById("sPending").textContent = pending + " 待处理";
  document.getElementById("sActive").textContent = active + " 进行中";
  document.getElementById("sDone").textContent = done + " 已完成";
  document.getElementById("progFill").style.width = (done / TOTAL * 100) + "%";
}

function updatePhaseNums() {
  PHASES.forEach(function(p) {
    var el = document.getElementById("pn" + p.num);
    if (!el) return;
    var allDone = p.nodes.every(function(n) { return nodeState[n.id] === "done"; });
    var anyActive = p.nodes.some(function(n) { return nodeState[n.id] === "active"; });
    el.className = "phase-num" + (allDone ? " s-done" : anyActive ? " s-active" : "");
  });
}

function updateConnectors() {
  for (var i = 0; i < PHASES.length - 1; i++) {
    var el = document.getElementById("conn" + i);
    if (!el) continue;
    var curPhase = PHASES[i];
    var nextPhase = PHASES[i + 1];
    var allDone = curPhase.nodes.every(function(n) { return nodeState[n.id] === "done"; });
    var nextActive = nextPhase.nodes.some(function(n) { return nodeState[n.id] === "active"; });
    if (allDone) {
      el.className = "conn s-done";
    } else if (nextActive) {
      el.className = "conn s-active";
    } else {
      el.className = "conn";
    }
  }
  /* Fan lines */
  document.querySelectorAll(".fan-line").forEach(function(line) {
    var pid = line.getAttribute("data-phase");
    var phase = PHASES.find(function(p) { return p.id === pid; });
    if (!phase) return;
    var allDone = phase.nodes.every(function(n) { return nodeState[n.id] === "done"; });
    var anyActive = phase.nodes.some(function(n) { return nodeState[n.id] === "active"; });
    if (allDone) {
      line.setAttribute("stroke", "var(--green)");
    } else if (anyActive) {
      line.setAttribute("stroke", "var(--blue)");
    } else {
      line.setAttribute("stroke", "var(--card-border)");
    }
  });
}

function findNodeData(id) {
  for (var i = 0; i < PHASES.length; i++) {
    for (var j = 0; j < PHASES[i].nodes.length; j++) {
      if (PHASES[i].nodes[j].id === id) return {node: PHASES[i].nodes[j], phase: PHASES[i]};
    }
  }
  return null;
}

/* ===== Detail Panel ===== */
function selectNode(id) {
  if (selectedNode) {
    var prev = document.getElementById("nd-" + selectedNode);
    if (prev) prev.classList.remove("selected");
  }
  selectedNode = id;
  var el = document.getElementById("nd-" + id);
  if (el) el.classList.add("selected");

  var data = findNodeData(id);
  if (!data) return;
  var n = data.node, p = data.phase;
  var st = nodeState[id];
  var stLabel = {pending:"⏳ 等待中",active:"⚡ 执行中",done:"✅ 已完成",error:"❌ 失败"}[st] || st;

  document.getElementById("detailPlaceholder").style.display = "none";
  var dc = document.getElementById("detailContent");
  dc.style.display = "flex";
  dc.style.flexDirection = "column";
  dc.style.gap = "12px";

  var html = '<div class="d-title">' + n.icon + ' ' + n.label + '</div>';
  html += '<div><span class="d-phase-tag">' + p.label + '</span> <span style="font-size:.8rem;margin-left:6px">' + stLabel + '</span></div>';
  html += '<div class="d-section"><div class="d-label">描述</div><div class="d-value">' + n.desc + '</div></div>';
  if (n.input) html += '<div class="d-section"><div class="d-label">输入</div><div class="d-value"><code>' + n.input + '</code></div></div>';
  if (n.output) html += '<div class="d-section"><div class="d-label">输出</div><div class="d-value"><code>' + n.output + '</code></div></div>';
  html += '<div class="d-section"><div class="d-label">实现详情</div><div class="d-value">' + n.detail + '</div></div>';
  html += '<div class="d-section"><div class="d-label">预计耗时</div><div class="d-value">' + (n.time / 1000).toFixed(1) + 's</div></div>';

  /* Show execution time if done */
  var timeEl = document.getElementById("nt-" + id);
  if (timeEl && timeEl.textContent) {
    html += '<div class="d-section"><div class="d-label">实际耗时</div><div class="d-value">' + timeEl.textContent + '</div></div>';
  }

  dc.innerHTML = html;
}

/* ===== Log ===== */
function addLog(text, cls) {
  var wrap = document.getElementById("logWrap");
  var t = (elapsedMs / 1000).toFixed(1);
  var line = document.createElement("div");
  line.className = "log-line " + (cls || "");
  line.innerHTML = '<span class="lt">[' + t + 's]</span> ' + text;
  wrap.appendChild(line);
  wrap.scrollTop = wrap.scrollHeight;
}

/* ===== Simulation Engine ===== */
function startSim() {
  if (simRunning) return;
  simRunning = true;
  simPaused = false;
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("pauseBtn").style.display = "";
  document.getElementById("logWrap").innerHTML = "";

  addLog("Pipeline 开始执行: START → init_doc", "la");
  startTimer();
  runNextPhase(0);
}

function startTimer() {
  timerInterval = setInterval(function() {
    if (!simPaused) {
      elapsedMs += 100;
      document.getElementById("timerDisp").textContent = (elapsedMs / 1000).toFixed(1) + "s";
    }
  }, 100);
}

function runNextPhase(pi) {
  if (!simRunning || pi >= PHASES.length) {
    finishSim();
    return;
  }
  var phase = PHASES[pi];
  var tag = phase.tag;

  if (tag === "parallel") {
    /* Run all nodes in parallel (simulate) */
    addLog("Phase " + phase.num + ": " + phase.nodes.length + " 个节点并行启动", "la");
    phase.nodes.forEach(function(n) { setNodeState(n.id, "active"); });
    updateStats(); updatePhaseNums(); updateConnectors();

    var maxTime = Math.max.apply(null, phase.nodes.map(function(n) { return n.time; }));
    phase.nodes.forEach(function(n) {
      var startT = elapsedMs;
      setTimeout(function() {
        if (!simRunning) return;
        waitIfPaused(function() {
          var dur = ((elapsedMs - startT) / 1000).toFixed(1);
          setNodeState(n.id, "done");
          document.getElementById("nt-" + n.id).textContent = dur + "s";
          addLog('<span class="ln">' + n.label + '</span> 完成 (' + dur + 's)', "ld");
          updateStats(); updatePhaseNums(); updateConnectors();
          if (selectedNode === n.id) selectNode(n.id);
        });
      }, n.time / simSpeed);
    });

    /* After max time, proceed to next phase */
    setTimeout(function() {
      if (!simRunning) return;
      waitIfPaused(function() {
        runNextPhase(pi + 1);
      });
    }, (maxTime + 300) / simSpeed);

  } else {
    /* Serial: run nodes one by one */
    runSerialNodes(phase, 0, function() {
      runNextPhase(pi + 1);
    });
  }
}

function runSerialNodes(phase, ni, callback) {
  if (!simRunning) return;
  if (ni >= phase.nodes.length) { callback(); return; }

  var n = phase.nodes[ni];
  waitIfPaused(function() {
    addLog('<span class="ln">' + n.label + '</span> 开始: ' + n.desc, "la");
    setNodeState(n.id, "active");
    updateStats(); updatePhaseNums(); updateConnectors();
    if (selectedNode === n.id) selectNode(n.id);

    var startT = elapsedMs;
    setTimeout(function() {
      if (!simRunning) return;
      waitIfPaused(function() {
        var dur = ((elapsedMs - startT) / 1000).toFixed(1);
        setNodeState(n.id, "done");
        document.getElementById("nt-" + n.id).textContent = dur + "s";
        addLog('<span class="ln">' + n.label + '</span> 完成 (' + dur + 's)', "ld");
        updateStats(); updatePhaseNums(); updateConnectors();
        if (selectedNode === n.id) selectNode(n.id);
        runSerialNodes(phase, ni + 1, callback);
      });
    }, n.time / simSpeed);
  });
}

function waitIfPaused(cb) {
  if (!simPaused) { cb(); return; }
  var check = setInterval(function() {
    if (!simPaused) { clearInterval(check); cb(); }
  }, 100);
}

function togglePause() {
  simPaused = !simPaused;
  var btn = document.getElementById("pauseBtn");
  btn.textContent = simPaused ? "▶ 继续" : "⏸ 暂停";
  if (simPaused) addLog("⏸ 模拟暂停", "");
  else addLog("▶ 模拟继续", "la");
}

function finishSim() {
  simRunning = false;
  clearInterval(timerInterval);
  addLog("🎉 Pipeline 执行完成! 共 " + TOTAL + " 个节点, 耗时 " + (elapsedMs / 1000).toFixed(1) + "s", "ld");
  document.getElementById("startBtn").style.display = "";
  document.getElementById("startBtn").textContent = "⟲ 重新模拟";
  document.getElementById("startBtn").onclick = function() { resetSim(); startSim(); };
  document.getElementById("pauseBtn").style.display = "none";
}

function resetSim() {
  simRunning = false;
  simPaused = false;
  elapsedMs = 0;
  clearInterval(timerInterval);
  document.getElementById("timerDisp").textContent = "0.0s";
  document.getElementById("logWrap").innerHTML = "";
  document.getElementById("startBtn").style.display = "";
  document.getElementById("startBtn").textContent = "▶ 开始模拟";
  document.getElementById("startBtn").onclick = startSim;
  document.getElementById("pauseBtn").style.display = "none";
  ALL_NODES.forEach(function(id) {
    nodeState[id] = "pending";
    setNodeState(id, "pending");
    var te = document.getElementById("nt-" + id);
    if (te) te.textContent = "";
  });
  updateStats(); updatePhaseNums(); updateConnectors();
  selectedNode = null;
  document.getElementById("detailPlaceholder").style.display = "";
  document.getElementById("detailContent").style.display = "none";
}

function setSpeed(v) { simSpeed = parseFloat(v) || 1; }

/* ===== Init ===== */
renderFlow();
updateStats();
</script>
