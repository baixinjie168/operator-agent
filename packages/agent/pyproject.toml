[project]
name = "operator-agent-app"
version = "0.1.0"
description = "Main agent system (FastAPI + LangGraph) for operator-agent"
requires-python = ">=3.12"
dependencies = [
    "operator-agent-shared",
    "mcp>=1.0",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "deepagents>=0.6.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent"]
