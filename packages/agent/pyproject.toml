[project]
name = "operator-agent-app"
version = "0.1.0"
description = "Main agent system (FastAPI + LangGraph) for operator-agent"
requires-python = ">=3.12"
dependencies = [
    "operator-agent-shared",
    "mcp>=1.0",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "langchain-openai>=0.3",
    "langgraph>=0.4",
    "asyncssh>=2.14",
    "openpyxl>=3.1",
    "numpy>=1.26",
    "pyyaml>=6.0",
    "packaging>=23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent"]
